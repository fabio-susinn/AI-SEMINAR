services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: barcelona_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/..
    volumes:
      - ./backend/results:/app/results
      - ./backend/data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - barcelona_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:8000
    container_name: barcelona_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - barcelona_net

  ollama:
    image: ollama/ollama:latest
    container_name: barcelona_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama      
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped
    networks:
      - barcelona_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-pull:
    image: ollama/ollama:latest
    container_name: barcelona_ollama_pull
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama...' &&
        until ollama list >/dev/null 2>&1; do sleep 2; done &&
        echo 'Pulling llama3.1...' &&
        ollama pull llama3.1
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - barcelona_net
    restart: "no"


volumes:
  ollama_models:


networks:
  barcelona_net:
    driver: bridge
